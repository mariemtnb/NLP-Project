<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentiYelp — NLP Sentiment Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Dashboard content truncated for brevity - full HTML available in repository -->
<section class="view active" id="view-predict">
  <div class="predict-grid">
    <div class="card predict-card">
      <h2 class="card-title">Review Text</h2>
      <textarea id="review-input" placeholder="Paste a Yelp review here..."></textarea>
      <button class="btn-primary" id="predict-btn"><span class="btn-icon">▶</span> Analyse Sentiment</button>
    </div>
    <div class="card result-card" id="result-card">
      <h2 class="card-title">Result</h2>
      <div class="result-placeholder" id="result-placeholder"><span class="placeholder-icon">◎</span><p>Enter a review and click Analyse</p></div>
    </div>
  </div>
</section>

<script src="/static/app.js"></script>
</body>
</html>
